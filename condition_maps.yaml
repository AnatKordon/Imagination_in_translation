# =====================================================================
# Full-experiment condition map.
#
# Roles:
#   - This YAML declares WHAT EXISTS (conditions, their generation/task,
#     canonical filenames).
#   - config.py turns it into usable paths + helpers (paths_for, load).
#
# Folder layout (same nesting in all three trees):
#   Data/participants_data/<DATASET>/<gen>/<task>/jatos_results_files_*/...
#   Data/processed_data/<DATASET>/<gen>/<task>/        # canonical CSVs
#   Data/processed_data/<DATASET>/combined/            # cross-condition CSVs
#   analysis/outputs/<DATASET>/<gen>/<task>/           # panels, rdms, graphs
#   analysis/outputs/<DATASET>/combined/               # cross-condition outputs
#   (analysis/ root holds the shared, condition-agnostic code.)
#
# A condition slug is "<gen>_<task>" (e.g. aigen_perc); the folder path is
# just the slug split on "_". The JATOS export folder is auto-discovered by
# glob, so no timestamp lives here.
# =====================================================================

# Active condition for single-condition scripts (set via the slug).
CURRENT_CONDITION: "aigen_del"

DATASET: "Full_experiment"

# Canonical pipeline filenames — identical for every condition.
FILENAMES:
  all_trials: all_trials.csv
  all_participants: all_participants.csv
  all_digit_span: all_digit_span.csv
  summary_by_uid: summary_by_uid.csv
  trials_final: trials_final.csv          # analysis df, no visual similarity
  trials_final_sim: trials_final_sim.csv  # analysis df + visual similarity

# 3 generation types x 3 memory tasks = 9 conditions.
#   generation: aigen (AI image gen) | nogen (no AI, text feedback) | plain (baseline, single attempt)
#   task:       perception | immediate | delay
#   feedback:   image | text | none
CONDITIONS:
  aigen_perc: {generation: aigen, task: perception, feedback: image}
  aigen_imm:  {generation: aigen, task: immediate,  feedback: image}
  aigen_del:  {generation: aigen, task: delay,      feedback: image}
  nogen_perc: {generation: nogen, task: perception, feedback: text}
  nogen_imm:  {generation: nogen, task: immediate,  feedback: text}
  nogen_del:  {generation: nogen, task: delay,      feedback: text}
  plain_perc: {generation: plain, task: perception, feedback: none}
  plain_imm:  {generation: plain, task: immediate,  feedback: none}
  plain_del:  {generation: plain, task: delay,      feedback: none}

# =====================================================================
# Frozen pilots. Names are messy and inconsistent on purpose (left as-is).
# Paths include the real Pilot_2/ (participants_data) and pilot_2/
# (processed_data) parents; analysis_sub lives under analysis/outputs/legacy_pilots/.
# To run an old pilot analysis, set CURRENT_CONDITION to one of these keys;
# config.py builds the single-condition globals from the explicit *_sub/df
# fields instead of deriving them from a slug.
# =====================================================================
LEGACY:
